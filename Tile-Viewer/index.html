<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Tiles Viewer</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; }
      #app { width: 100%; height: 100%; }
      #hud {
        position: absolute;
        left: 12px;
        top: 12px;
        padding: 8px 10px;
        background: rgba(0,0,0,0.55);
        color: #fff;
        font: 12px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        border-radius: 8px;
        user-select: none;
      }
      #hud code { color: #d7ffb5; }
      #debugPanel {
        position: absolute;
        right: 12px;
        bottom: 12px;
        width: min(520px, calc(100vw - 24px));
        background: rgba(0,0,0,0.68);
        color: #fff;
        border-radius: 10px;
        padding: 10px;
        box-sizing: border-box;
      }
      #debugPanelHeader {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        font: 12px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #copyDebugBtn {
        border: 0;
        border-radius: 6px;
        padding: 6px 10px;
        background: #2b6cb0;
        color: #fff;
        font: 12px/1 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        cursor: pointer;
      }
      #debugDump {
        width: 100%;
        height: 120px;
        resize: vertical;
        box-sizing: border-box;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        background: rgba(14,14,14,0.9);
        color: #d7ffb5;
        padding: 8px;
        font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      Loading <code>tileset.json</code>…<br/>
      WASD/RF = fly • mouse drag = look<br/>
      1/2/3/4 = render debug • D = double-sided • B = bounds
    </div>
    <div id="debugPanel">
      <div id="debugPanelHeader">
        <span>Debug Output (press F, then copy)</span>
        <button id="copyDebugBtn" type="button">Copy Debug</button>
      </div>
      <textarea id="debugDump" readonly>Press F in the viewer to generate debug output.</textarea>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
